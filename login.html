<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Popcorn Critics</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1><a href="index.html" style="color:white; text-decoration:none;">🍿 Popcorn Critics</a></h1>
        </div>
    </header>

    <div class="form-container">
        <h2>로그인</h2>
        <form onsubmit="return validateLogin()">
            <div class="input-group">
                <label for="userid">아이디</label>
                <input type="text" id="userid" placeholder="아이디를 입력하세요">
            </div>
            <div class="input-group">
                <label for="userpw">비밀번호</label>
                <input type="password" id="userpw" placeholder="비밀번호를 입력하세요">
            </div>
            
            <div class="captcha-box">
                <input type="checkbox" id="notRobot">
                <label for="notRobot">로봇이 아닙니다 (필수)</label>
            </div>

            <button type="submit" class="submit-btn">로그인</button>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
